services:
  - type: web
    name: football-automation-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VIDEO_RENDER_MODE
        value: off
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app   # replace with your real Vercel URL
      - key: GROQ_API_KEY
        sync: false                           # set in Render dashboard
      - key: HIGHLIGHTLY_API_KEY
        sync: false
      - key: HIGHLIGHTLY_API_KEY_2
        sync: false
