services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - backend_storage:/app/storage

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  backend_storage:
